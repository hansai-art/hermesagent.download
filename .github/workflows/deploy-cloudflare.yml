# 部署到 Cloudflare Pages(正式站):aexers 帳號的 `hermesagent` 專案
#
# 啟用條件:repo Settings → Secrets and variables → Actions 加入兩個 secret:
#   CLOUDFLARE_API_TOKEN   — dash.cloudflare.com/profile/api-tokens,
#                            用「Edit Cloudflare Workers」範本或自訂(Account.Cloudflare Pages: Edit)
#   CLOUDFLARE_ACCOUNT_ID  — e0aad69d29358fbd0c97c7fc20bf7363(aexers 帳號)
# secret 未設定時此 workflow 會直接跳過,不會紅。
name: Deploy Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build

      - name: Check secrets
        id: check
        run: |
          if [[ -n "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::notice::CLOUDFLARE_API_TOKEN 未設定,略過 Cloudflare 部署"
          fi

      - name: Deploy to Cloudflare Pages
        if: steps.check.outputs.ok == 'true'
        run: npx wrangler pages deploy dist --project-name=hermesagent --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
