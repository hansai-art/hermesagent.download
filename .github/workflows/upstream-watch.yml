# UPSTREAM-WATCH:每日盯上游 release;有新版就開 issue 列出待驗證文章
name: Upstream Watch

on:
  schedule:
    - cron: '0 2 * * *' # 每日 02:00 UTC(台灣 10:00)
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Watch upstream releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/tools/upstream-watch.mjs

      - name: Commit state
        run: |
          if [[ -n "$(git status --porcelain data/)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/
            git commit -m "chore(pipeline): upstream-watch state 更新"
            git push
          fi
