# FRESHNESS:жҜҸйҖұжҺғ last_verified йҒҺжңҹж–Үз« ,иҮӘеӢ•зҝ» status(publishedвҶ”outdated)
name: Freshness

on:
  schedule:
    - cron: '0 1 * * 1' # жҜҸйҖұдёҖ 01:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Flip stale statuses
        id: flip
        run: |
          node scripts/tools/freshness.mjs --apply | tee /tmp/freshness.log
          echo "flipped=$(grep -oP 'FLIPPED_COUNT=\K\d+' /tmp/freshness.log)" >> "$GITHUB_OUTPUT"

      - name: Commit changes
        if: steps.flip.outputs.flipped != '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add knowledge/
          git commit -m "chore(pipeline): freshness жҺғжҸҸ вҖ” ${{ steps.flip.outputs.flipped }} зҜҮ status зҝ»иҪү"
          git push

      - name: Open issue for newly outdated articles
        if: steps.flip.outputs.flipped != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo "FRESHNESS pipeline жң¬йҖұзҝ»иҪүдәҶ ${{ steps.flip.outputs.flipped }} зҜҮж–Үз« зҡ„ status:"
            echo
            echo '```'
            grep -E 'рҹ“ү|рҹ“Ҳ' /tmp/freshness.log || true
            echo '```'
            echo
            echo "жЁҷжҲҗ outdated зҡ„ж–Үз« жңғеңЁз¶Із«ҷйЎҜзӨәгҖҢеҸҜиғҪйҒҺжңҹгҖҚж©«е№…гҖӮ"
            echo "иӘҚй ҳйҮҚж–°й©—иӯү:еҜҰжё¬еҫҢжӣҙж–° \`last_verified\`,дёӢж¬ЎжҺғжҸҸжңғиҮӘеӢ•зҝ»еӣһ publishedгҖӮ"
          } > /tmp/issue-body.md
          gh issue create \
            --title "рҹ•°пёҸ жң¬йҖұйҒҺжңҹжҺғжҸҸ:${{ steps.flip.outputs.flipped }} зҜҮж–Үз«  status и®Ҡжӣҙ" \
            --body-file /tmp/issue-body.md \
            --label freshness
